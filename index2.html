<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Help Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
}

/* Chat container */
.chat-container {
    max-width: 400px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    background: #1f1f1f;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

/* Chat area */
#chatbox {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

/* Chat bubbles */
.message {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 75%;
}

.user {
    background: #007bff;
    margin-left: auto;
    text-align: right;
}

.bot {
    background: #2a2a2a;
    margin-right: auto;
}

/* Input area */
.input-area {
    display: flex;
    border-top: 1px solid #333;
}

input {
    flex: 1;
    padding: 15px;
    border: none;
    outline: none;
    background: #1f1f1f;
    color: white;
}

button {
    padding: 15px;
    border: none;
    background: #007bff;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        🎓 University Help Chatbot
    </div>

    <div id="chatbox"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

function addMessage(text, className) {
    let chatbox = document.getElementById("chatbox");
    let msg = document.createElement("div");

    msg.className = "message " + className;
    msg.innerText = text;

    chatbox.appendChild(msg);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function botResponse(input) {
    input = input.toLowerCase();

    if (input.includes("hello") || input.includes("hi")) {
        return random([
            "Hello 👋 How can I assist you?",
            "Hi there! What do you need help with?",
            "Welcome! Ask me anything about the university."
        ]);
    }

    if (input.includes("course")) {
        return "We offer Engineering, Computer Science, Mining, Geology, and Business.";
    }

    if (input.includes("deadline") || input.includes("registration")) {
        return "Registration closes about 2 weeks after semester starts.";
    }

    if (input.includes("fees")) {
        return "Fees vary by program. Check the student portal for details.";
    }

    if (input.includes("admission")) {
        return "Admission requires WASSCE  qualification.";
    }

    if (input.includes("timetable")) {
        return "Your timetable is available on the student portal.";
    }

    if (input.includes("help")) {
        return "I can help with courses, admission, fees, deadlines, and timetable.";
    }

    return random([
        "I can help with courses, fees, deadlines, and admission.",
        "I only answer university-related questions."
    ]);
}

function random(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function sendMessage() {
    let inputField = document.getElementById("input");
    let text = inputField.value.trim();

    if (text === "") return;

    addMessage(text, "user");
    inputField.value = "";

    // Typing animation
    addMessage("Typing...", "bot");

    setTimeout(() => {
        let chatbox = document.getElementById("chatbox");
        chatbox.removeChild(chatbox.lastChild);

        let response = botResponse(text);
        addMessage(response, "bot");
    }, 1000);
}

// Enter key support
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

</script>

</body>
</html>
